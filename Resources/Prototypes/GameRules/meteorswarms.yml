# Game Rules

- type: entity
  parent: BaseGameRule
  id: MeteorSwarm
  abstract: true
  components:
  - type: GameRule
  - type: StationEvent
    reoccurrenceDelay: 1
    earliestStart: 12
    minimumPlayers: 25
  - type: MeteorSwarm

- type: entity
  parent: MeteorSwarm
  id: SpaceDustMinor
  components:
  - type: StationEvent
    weight: 14
    earliestStart: 2
    minimumPlayers: 0
  - type: MeteorSwarm
    announcement: station-event-space-dust-minor-start-announcement # CD Change: custom announcement
    announcementSound: /Audio/Announcements/attention.ogg
    nonDirectional: true
    meteors:
      MeteorSpaceDust: 1
    waves:
      min: 2
      max: 3
    meteorsPerWave:
      min: 3
      max: 5

- type: entity
  parent: MeteorSwarm
  id: SpaceDustMajor
  components:
  - type: StationEvent
    weight: 22
    minimumPlayers: 0
  - type: MeteorSwarm
    announcement: station-event-space-dust-moderate-start-announcement # CD Change: custom announcement
    announcementSound: /Audio/Announcements/attention.ogg
    nonDirectional: true
    meteors:
      MeteorSpaceDust: 1
    waves:
      min: 2
      max: 3
    meteorsPerWave:
      # CD: Decrease count
      min: 6
      max: 10

- type: entity
  parent: MeteorSwarm
  id: MeteorSwarmSmall
  components:
  - type: StationEvent
    weight: 8
    minimumPlayers: 15
  - type: MeteorSwarm
    announcement: station-event-meteor-swarm-small-start-announcement # CD Change: custom announcement
    meteors:
      # CD: Decrease count
      MeteorSmall: 5
      MeteorMedium: 2

- type: entity
  parent: MeteorSwarm
  id: MeteorSwarmMedium
  components:
  - type: StationEvent
    weight: 10
  - type: MeteorSwarm
    meteors:
      MeteorSmall: 3
      MeteorMedium: 6
      MeteorLarge: 1

- type: entity
  parent: MeteorSwarm
  id: MeteorSwarmLarge
  components:
  - type: StationEvent
    weight: 5
  - type: MeteorSwarm
    announcement: station-event-meteor-swarm-moderate-start-announcement # CD Change: custom announcement
    meteors:
      # CD: Decrease count
      MeteorSmall: 2
      MeteorMedium: 3
      MeteorLarge: 1

- type: entity
  parent: MeteorSwarm
  id: UristSwarm
  components:
  - type: StationEvent
    weight: 0.05
  - type: MeteorSwarm
    announcement: station-event-meteor-urist-start-announcement
    announcementSound: /Audio/Announcements/attention.ogg
    meteors:
      MeteorUrist: 1
    waves:
      min: 3
      max: 3
    meteorsPerWave:
      min: 10
      max: 10

