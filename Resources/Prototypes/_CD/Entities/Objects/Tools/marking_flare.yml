- type: entity
  abstract: true
  parent: Flare
  id: MarkingFlareBase
  name: marking flare
  description: A flare that produces a small light for around an hour. Primarily used for pathfinding.
  components:
  - type: ExpendableLight
    glowDuration: 3600
  - type: Sprite
    sprite: _CD/Objects/Misc/marking_flare.rsi
    layers:
      - map: [ enum.ExpendableLightVisualLayers.Base ]
        state: flare_base
        color: "#FFFFFF"
      - map: [ enum.ExpendableLightVisualLayers.Glow ]
        state: flare_burn
        color: "#FFFFFF"
        visible: false
        shader: unshaded
      - map: [ enum.ExpendableLightVisualLayers.Overlay ]
        state: flare_unlit
  - type: PointLight
    color: "#FFFFFF"
  - type: LightBehaviour
    behaviours:
      - !type:FadeBehaviour # have the radius start small and get larger as it starts to burn
        id: turn_on
        maxDuration: 25.0
        startValue: 1.5
        endValue: 2.0
      - !type:FadeBehaviour # fade out radius as it burns out
        id: fade_out
        maxDuration: 15.0
        startValue: 2.0
        endValue: 1.2
  - type: Tag
    tags:
    - Flare
    - MarkingFlare
    - Trash

