# Senior Roles
- type: entity
  parent: IDCardStandard
  id: SeniorEngineerIDCard
  name: senior engineer ID card
  components:
  - type: Sprite
    layers:
    - state: default
    - state: stripe_top
      color: &color-engineering-top "#ffa62b"
    - state: stripe_bottom
      color: &color-engineering-bottom "#bc5b00"
    - sprite: &icon-rsi Interface/Misc/job_icons.rsi
      offset: &icon-offset -0.09375, 0.0625
      state: SeniorEngineer
  - type: PresetIdCard
    job: SeniorEngineer

