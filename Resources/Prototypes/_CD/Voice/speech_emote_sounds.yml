## How it works?
## We have base Unisex sounds, which are same for all. Base Male and Female sounds (actually human), which are using for each sex. And base unique for each species sounds.
## Than we just using complects of parents to make proto for each specie and sex

# Universal stuff. Replacing original emoteSounds
- type: emoteSounds
  id: CDUnisexSounds
  sounds:
    CatMeow:
      collection: CatMeows
    CatHisses:
      collection: CatHisses
    MonkeyScreeches:
      collection: MonkeyScreeches
    RobotBeep:
      collection: RobotBeeps
    Weh:
      collection: Weh
    Hew:
      collection: Hew
    Whistle:
      collection: Whistles
    Snore:
      collection: Snores

- type: emoteSounds
  id: CDMaleSounds
  params:
    variation: 0.125
  sounds:
    Scream:
      collection: MaleScreams
    Laugh:
      collection: MaleLaugh
    Sneeze:
      collection: MaleSneezes
    Cough:
      collection: MaleCoughs
    Yawn:
      collection: MaleYawn
    Sigh:
      collection: MaleSigh
    Crying:
      collection: MaleCry
    Honk:
      collection: BikeHorn
    Gasp:
      collection: MaleGasp
    DefaultDeathgasp:
      collection: MaleDeathGasp

- type: emoteSounds
  id: CDFemaleSounds
  params:
    variation: 0.125
  sounds:
    Scream:
      collection: FemaleScreams
    Laugh:
      collection: FemaleLaugh
    Sneeze:
      collection: FemaleSneezes
    Cough:
      collection: FemaleCoughs
    Yawn:
      collection: FemaleYawn
    Honk:
      collection: CluwneHorn
    Sigh:
      collection: FemaleSigh
    Crying:
      collection: FemaleCry
    Gasp:
      collection: FemaleGasp
    DefaultDeathgasp:
      collection: FemaleDeathGasp

# Species
## Human
- type: emoteSounds
  parent: [CDUnisexSounds, CDMaleSounds]
  id: CDMaleHuman

- type: emoteSounds
  parent: [CDUnisexSounds, CDFemaleSounds]
  id: CDFemaleHuman

## Dwarfs. Actually as human, but with other params
- type: emoteSounds
  parent: [CDMaleHuman]
  id: CDMaleDwarf
  params:
    variation: 0.125
    pitch: 0.75

- type: emoteSounds
  parent: [CDFemaleHuman]
  id: CDFemaleDwarf
  params:
    variation: 0.125
    pitch: 0.75

