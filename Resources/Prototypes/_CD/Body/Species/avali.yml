- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceAvali
  name: avali appearance
  components:
  - type: Inventory
    speciesId: avali
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female

  - type: InitialBody
    organs:
      Torso: OrganAvaliTorso
      Head: OrganAvaliHead
      ArmLeft: OrganAvaliArmLeft
      ArmRight: OrganAvaliArmRight
      HandRight: OrganAvaliHandRight
      HandLeft: OrganAvaliHandLeft
      LegLeft: OrganAvaliLegLeft
      LegRight: OrganAvaliLegRight
      FootLeft: OrganAvaliFootLeft
      FootRight: OrganAvaliFootRight
      Brain: OrganHumanBrain
      Eyes: OrganAvaliEyes
      Tongue: OrganHumanTongue
      Appendix: OrganHumanAppendix
      Ears: OrganHumanEars
      Lungs: OrganHumanLungs
      Heart: OrganHumanHeart
      Stomach: OrganHumanStomach
      Liver: OrganHumanLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Avali

- type: entity
  save: false
  name: Urist McRaptor
  parent:
  - AppearanceAvali
  - BaseSpeciesMobOrganic
  id: BaseMobAvali
  abstract: true
  components:
  - type: HumanoidProfile
    species: Avali
  - type: Hunger
  - type: Thirst
  - type: Icon
    sprite: _CD/Mobs/Species/Avali/parts.rsi
    state: full
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatChicken
      amount: 3
  - type: Speech
    speechVerb: Parrot # RMC did it right.
    speechSounds: MaleAvali
    allowedEmotes: [ 'Call', 'Chirp', 'Hiss', 'Scree', 'Squawk', 'Trill', 'Warble', 'Wurble' ]
  - type: TypingIndicator
    proto: avali
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 95 #tiny
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Vocal
    sounds:
      Male: CDMaleAvali
      Female: CDFemaleAvali
      Unsexed: CDMaleAvali
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Moth # PLACEHOLDER for now :3
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#7a8bf2"
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: AmmoniaBlood
        Quantity: 300
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: Temperature
    specificHeat: 48
    currentTemperature: 296.15
  - type: TemperatureDamage
    heatDamageThreshold: 310
    coldDamageThreshold: 223
    coldDamage: # same damage as moths
      types:
        Cold : 0.05 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 3 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds: # all temps are 10K colder then moths, adjusted for current temp.
      265: 0.8
      251: 0.6
      226: 0.4
  - type: ThermalRegulator
    metabolismHeat: 400 # icebirb go brrr
    radiatedHeat: 100
    implicitHeatRegulation: 500
    sweatHeatRegulation: 2000
    shiveringHeatRegulation: 2000
    normalBodyTemperature: 296.15
    thermalRegulationTemperatureThreshold: 10

