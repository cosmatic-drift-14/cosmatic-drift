- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceFoxfolk
  name: foxfolk appearance
  components:
  - type: Inventory
    speciesId: foxfolk
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female

  - type: InitialBody
    organs:
      Torso: OrganFoxfolkTorso
      Head: OrganFoxfolkHead
      ArmLeft: OrganFoxfolkArmLeft
      ArmRight: OrganFoxfolkArmRight
      HandRight: OrganFoxfolkHandRight
      HandLeft: OrganFoxfolkHandLeft
      LegLeft: OrganFoxfolkLegLeft
      LegRight: OrganFoxfolkLegRight
      FootLeft: OrganFoxfolkFootLeft
      FootRight: OrganFoxfolkFootRight
      Brain: OrganHumanBrain
      Eyes: OrganHumanEyes
      Tongue: OrganHumanTongue
      Appendix: OrganHumanAppendix
      Ears: OrganHumanEars
      Lungs: OrganHumanLungs
      Heart: OrganHumanHeart
      Stomach: OrganHumanStomach
      Liver: OrganAnimalLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Foxfolk

- type: entity
  save: false
  name: Urist McFoxfolk
  parent: 
  - AppearanceFoxfolk
  - BaseSpeciesMobOrganic
  id: BaseMobFoxfolk
  abstract: true
  components:
  - type: HumanoidProfile
    species: Foxfolk
  - type: Hunger
  - type: Inventory # Allows foxfolks to wear properly shaped helmets and other clothing. When displacement maps happen this might need to change.
    speciesId: foxfolk
  - type: Thirst
  - type: Icon
    sprite: _CD/Mobs/Species/Foxfolk/parts.rsi
    state: full
  - type: Body
    prototype: Foxfolk
    requiredLegs: 2
  - type: Speech
    speechSounds: Foxfolk
    speechVerb: Foxfolk
    allowedEmotes: [ 'Bark', 'Snarl', 'Whine', 'Howl', 'Growl' ]
  - type: TypingIndicator
    proto: foxfolk
  - type: Vocal
    sounds:
      Male: MaleFoxfolk
      Female: FemaleFoxfolk
      Unsexed: MaleFoxfolk
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Foxfolk
  - type: MeleeWeapon
    hidden: true
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    angle: 30
    animation: WeaponArcClaw
    damage: #For reference, lizards do five slash.
      types:
        Blunt: 2
        Slash: 3
  - type: Temperature # These are moth values, but do make sense for Foxfolk. The heat damage per second might be high, but we can tune it if there are issues.
    specificHeat: 46
    currentTemperature: 310.15
  - type: TemperatureDamage
    heatDamageThreshold: 320
    coldDamageThreshold: 230
    coldDamage:
      types:
        Cold : 0.05 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 3 #per second, scales with temperature & other constants
  - type: Wagging
    action: ActionToggleFoxfolkakinWagging

- type: entity
  parent: OrganBase
  id: OrganFoxfolk
  abstract: true
  suffix: Foxfolk

- type: entity
  parent: OrganFoxfolk
  id: OrganFoxfolkInternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi

- type: entity
  id: OrganFoxfolkVisual
